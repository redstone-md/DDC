modLoader = "javafml"
loaderVersion = "*"
license = "MIT"
issueTrackerURL = "https://github.com/redstone-md/DDC/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "Dungeons, Dragons & Crafting"
logoFile = "assets/ddc/icon.png"
authors = "redstone-md"
description = '''
Tabletop D&D rules and an asymmetric Game Master role inside Minecraft.
'''

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "*"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version}]"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "architectury"
type = "required"
versionRange = "[20.0.9,)"
ordering = "AFTER"
side = "BOTH"
