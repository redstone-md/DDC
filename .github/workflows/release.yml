name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, e.g. v1.0.0'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}
          # git-cliff reads the whole history to work out what changed since the last tag.
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Read the version
        id: version
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "number=${tag#v}" >> "$GITHUB_OUTPUT"

      # A tag whose version does not match the build produces jars named after something else, which
      # is worse than a failed release.
      - name: Check the tag matches gradle.properties
        run: |
          built=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          tagged="${{ steps.version.outputs.number }}"
          if [ "$built" != "$tagged" ]; then
            echo "::error::tag $tagged does not match mod_version=$built in gradle.properties"
            exit 1
          fi

      - name: Build and test
        run: ./gradlew build --stacktrace

      # The notes are derived from the commits in this release rather than written by hand, so they
      # cannot drift from what actually shipped.
      - name: Generate the release notes
        id: notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          # GITHUB_REPO is deliberately unset. Setting it makes git-cliff pull pull-request metadata
          # from the API, which this token has no permission for and the template never uses; it
          # panics on the 403 rather than carrying on without it.

      # Named explicitly rather than globbed: the libs directory also holds the -raw and -sources
      # jars, and a release that quietly ships the wrong one of those is hard to notice.
      - name: Stage the jars to publish
        id: jars
        run: |
          mc=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          v="${{ steps.version.outputs.number }}"
          mkdir -p dist
          cp "fabric/build/libs/ddc-fabric-${v}+${mc}.jar" dist/
          cp "neoforge/build/libs/ddc-neoforge-${v}+${mc}.jar" dist/
          # PRD 5's companion pack. Zipped from the tag rather than kept as a binary in the repo, so
          # it can never be a version behind the schema it is teaching.
          (cd assets/template && zip -qr "../../dist/ddc-srd-template.zip" .)
          ls -l dist

      - name: Assemble the release body
        run: |
          mc=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          {
            echo '<img src="https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.version.outputs.tag }}/assets/banner.png" alt="Dungeons, Dragons & Crafting" width="100%">'
            echo
            echo "### Downloads"
            echo
            echo "| Loader | Jar |"
            echo "|---|---|"
            echo "| Fabric | \`ddc-fabric-${{ steps.version.outputs.number }}+${mc}.jar\` |"
            echo "| NeoForge | \`ddc-neoforge-${{ steps.version.outputs.number }}+${mc}.jar\` |"
            echo "| Template data pack | \`ddc-srd-template.zip\` |"
            echo
            echo "Both need Minecraft \`${mc}\`, **Java 25**, and Architectury API. Fabric also needs Fabric API."
            echo
            echo "---"
            echo
            cat RELEASE_NOTES.md
            echo
            echo "---"
            echo
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/CHANGELOG.md) for what this release deliberately does **not** ship yet."
          } > BODY.md
          cat BODY.md

      - name: Publish the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DDC ${{ steps.version.outputs.number }}
          body_path: BODY.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          fail_on_unmatched_files: true
          files: dist/*.jar
