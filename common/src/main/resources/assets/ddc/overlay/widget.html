<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DDC — stream overlay</title>
<style>
  /* Transparent: OBS composites this over the capture, so the page must not paint a background. */
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: "Bookman Old Style", Georgia, serif;
  }

  #rolls {
    position: absolute;
    top: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
  }

  .roll {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 10px 18px;
    border-radius: 6px;
    border-left: 4px solid #c9973f;
    background: rgba(18, 16, 14, 0.82);
    color: #e8dcc0;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
    animation: enter 240ms ease-out, leave 500ms ease-in forwards;
    /* Held on screen, then faded: the delay is the life of the alert. */
    animation-delay: 0s, 7s;
  }

  .roll .who { font-size: 18px; opacity: 0.75; }
  .roll .what { font-size: 15px; opacity: 0.55; }
  .roll .total { font-size: 34px; font-weight: bold; margin-left: auto; }

  .roll.crit { border-left-color: #f2c879; }
  .roll.crit .total { color: #f2c879; text-shadow: 0 0 14px rgba(242, 200, 121, 0.6); }
  .roll.fumble { border-left-color: #c04040; }
  .roll.fumble .total { color: #ff5555; }

  @keyframes enter {
    from { opacity: 0; transform: translateX(40px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes leave {
    to { opacity: 0; transform: translateX(40px); }
  }

  /* Bottom-left. The top-left corner belongs to the game's own HUD, and a widget drawn over the
     player's own sheet is a widget that hid the thing it was describing -- which is exactly what it
     did until someone put the two side by side in OBS. The roll alerts own the top-right, and a
     stream's camera usually sits bottom-right, so this is the corner nobody else wants. */
  #party {
    position: absolute;
    bottom: 24px;
    left: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .member {
    width: 210px;
    padding: 8px 12px;
    border-radius: 6px;
    border-left: 4px solid #c9973f;
    background: rgba(18, 16, 14, 0.82);
    color: #e8dcc0;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
  }

  .member .name { font-size: 16px; }
  .member .klass { font-size: 12px; opacity: 0.6; margin-left: 6px; }

  .bar {
    margin-top: 6px;
    height: 8px;
    border-radius: 4px;
    background: rgba(0, 0, 0, 0.55);
    overflow: hidden;
  }

  /* Width is the health, so the bar animates rather than jumping as damage lands. */
  .bar > span {
    display: block;
    height: 100%;
    background: #6abe5c;
    transition: width 400ms ease-out, background-color 400ms linear;
  }

  .member.hurt .bar > span { background: #e0a83c; }
  .member.critical .bar > span { background: #c04040; }
  .member .hp { float: right; font-size: 12px; opacity: 0.75; }

  /* Bottom centre: an error message has no business sitting on top of the party it is apologising
     for, and every other corner is spoken for. */
  /* The level meter: thinner than the health bar, and quieter. Health is the fact a viewer needs in a
     fight; progress is the one they enjoy between them, and the two should not shout equally. */
  .xp {
    margin-top: 3px;
    height: 3px;
    border-radius: 2px;
    background: rgba(0, 0, 0, 0.55);
    overflow: hidden;
  }

  .xp > span {
    display: block;
    height: 100%;
    background: #c9973f;
    transition: width 600ms ease-out;
  }

  /* The quest, across the top: the thing the Game Master would have written on a whiteboard. */
  #quest {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 60%;
    padding: 8px 20px;
    border-radius: 6px;
    border-bottom: 3px solid #c9973f;
    background: rgba(18, 16, 14, 0.82);
    color: #e8dcc0;
    font-size: 17px;
    text-align: center;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
  }
  #quest[hidden] { display: none; }

  #offline {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 8px;
    padding: 8px 14px;
    border-radius: 4px;
    background: rgba(74, 28, 36, 0.9);
    color: #e8dcc0;
    font-size: 13px;
  }
  #offline[hidden] { display: none; }
</style>
</head>
<body>
<div id="quest" hidden></div>
<div id="party"></div>
<div id="rolls"></div>
<div id="offline" hidden>DDC overlay: not connected</div>

<script>
  // The page is served by the game on the same port it speaks WebSocket on, so the socket's address
  // follows the page's rather than being written down twice.
  const SOCKET_URL = `ws://${location.host}/ws`;

  // How long an alert lives, in step with the CSS above.
  const ALERT_MS = 7600;

  const rolls = document.getElementById("rolls");
  const party = document.getElementById("party");
  const quest = document.getElementById("quest");
  const offline = document.getElementById("offline");

  function show(data) {
    const card = document.createElement("div");
    card.className = "roll"
      + (data.is_critical_success ? " crit" : "")
      + (data.is_critical_failure ? " fumble" : "");

    const who = document.createElement("span");
    who.className = "who";
    who.textContent = data.player;

    const what = document.createElement("span");
    what.className = "what";
    what.textContent = data.notation + (data.mode !== "normal" ? " · " + data.mode : "");

    const total = document.createElement("span");
    total.className = "total";
    total.textContent = data.total;

    card.append(who, what, total);
    rolls.prepend(card);

    setTimeout(() => card.remove(), ALERT_MS);
  }

  /**
   * Draws the party's health cards. The server sends the whole party, so the list is rebuilt rather
   * than patched: working out who left from a stream of individual cards is the widget's problem to
   * not have.
   */
  function showParty(data) {
    party.replaceChildren();
    for (const member of data.members) {
      const fraction = member.max_hit_points > 0 ? member.hit_points / member.max_hit_points : 0;

      const card = document.createElement("div");
      card.className = "member"
        + (fraction <= 0.25 ? " critical" : fraction <= 0.5 ? " hurt" : "");

      const name = document.createElement("span");
      name.className = "name";
      name.textContent = member.player;

      const klass = document.createElement("span");
      klass.className = "klass";
      klass.textContent = `${member.class} · ${member.level}`;

      const hp = document.createElement("span");
      hp.className = "hp";
      hp.textContent = `${member.hit_points}/${member.max_hit_points}`;

      const bar = document.createElement("div");
      bar.className = "bar";
      const fill = document.createElement("span");
      fill.style.width = `${Math.max(0, Math.min(1, fraction)) * 100}%`;
      bar.append(fill);

      card.append(name, klass, hp, bar);

      // The level meter, when there is a level left to reach. At the last level there is no meter
      // rather than a full one: a bar that can never move is furniture.
      if (member.next_level > member.experience) {
        const xp = document.createElement("div");
        xp.className = "xp";
        const progress = document.createElement("span");
        progress.style.width = `${(member.experience / member.next_level) * 100}%`;
        xp.append(progress);
        card.append(xp);
      }

      party.append(card);
    }
  }

  function connect() {
    const socket = new WebSocket(SOCKET_URL);

    socket.onopen = () => { offline.hidden = true; };
    socket.onmessage = (event) => {
      const message = JSON.parse(event.data);
      if (message.event === "dice_roll") {
        show(message.data);
      } else if (message.event === "party") {
        showParty(message.data);
      } else if (message.event === "quest") {
        // An empty line means the party finished it: the board is wiped rather than left saying
        // nothing in a box.
        quest.textContent = message.data.text;
        quest.hidden = !message.data.text;
      }
    };
    // The game closing should not leave a dead overlay: keep trying, quietly.
    socket.onclose = () => {
      offline.hidden = false;
      setTimeout(connect, 2000);
    };
    socket.onerror = () => socket.close();
  }

  connect();
</script>
</body>
</html>
